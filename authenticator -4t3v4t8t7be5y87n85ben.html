<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureVault • One-Tap Access</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0a1f, #1a0f2e, #0a0a0a);
      font-family: 'Inter', system_ui, sans-serif;
    }
    .glass {
      background: rgba(15, 10, 35, 0.75);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(192, 38, 211, 0.3);
    }
    .neon-glow {
      box-shadow: 0 0 30px rgba(192, 38, 211, 0.5);
    }
  </style>
</head>
<body class="min-h-screen text-white">

  <!-- HEADER -->
  <header class="fixed top-0 left-0 right-0 z-50 glass border-b border-purple-500/20">
    <div class="max-w-xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-purple-500 to-violet-600 flex items-center justify-center neon-glow">
          <i class="fas fa-lock text-2xl"></i>
        </div>
        <span class="text-2xl font-bold tracking-tighter">Authenticator - MT EDITER </span>
      </div>
      <button onclick="toggleMenu()" class="text-2xl p-2 hover:bg-white/10 rounded-xl transition">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </header>

  <div class="pt-28 pb-12 max-w-xl mx-auto px-4">

    <!-- 1. OTP SCREEN -->
    <div id="otp-screen">
      <div class="text-center mb-12">
        <div class="mx-auto w-24 h-24 bg-gradient-to-br from-purple-500 to-violet-600 rounded-3xl flex items-center justify-center mb-8 neon-glow">
          <i class="fas fa-fingerprint text-6xl"></i>
        </div>
        <h1 class="text-4xl font-bold mb-3 tracking-tighter">Xác thực danh tính</h1>
        <p class="text-slate-400 text-lg">Nhập mã xác thực 6 số</p>
      </div>

      <div class="glass rounded-3xl p-10">
        <input id="otp" type="text" maxlength="6"
               class="w-full bg-transparent text-center text-7xl font-mono tracking-[18px] focus:outline-none py-8 border-b-2 border-purple-500/30 focus:border-purple-500"
               placeholder="••••••">

        <button onclick="verifyOTP()" 
                class="mt-10 w-full py-6 bg-gradient-to-r from-purple-600 to-violet-600 rounded-2xl text-xl font-semibold tracking-wider hover:brightness-110 transition-all">
          XÁC THỰC BẢO MẬT
        </button>
      </div>
    </div>

    <!-- 2. VERIFYING SCREEN -->
    <div id="verifying-screen" class="hidden">
      <div class="glass rounded-3xl p-10 text-center">
        <div class="flex justify-center mb-8">
          <div class="relative w-20 h-20">
            <div class="absolute inset-0 border-4 border-purple-500/30 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-transparent border-t-purple-500 rounded-full animate-spin"></div>
          </div>
        </div>
        <h3 class="text-xl font-semibold mb-2">Đang xác minh...</h3>
        <p class="text-purple-400">AIMSTORENEXUSHUB • Super Group</p>

        <div class="mt-12 space-y-5 text-left" id="steps"></div>
      </div>
    </div>

    <!-- 3. SUCCESS SCREEN -->
    <div id="success-screen" class="hidden text-center">
      <div class="glass rounded-3xl p-12">
        <div class="mx-auto w-32 h-32 bg-green-500/10 border-4 border-green-500 rounded-full flex items-center justify-center mb-8">
          <i class="fas fa-check text-8xl text-green-400"></i>
        </div>
        <h2 class="text-5xl font-bold text-green-400 mb-2">Access Granted</h2>
        <p class="text-slate-300">Xác thực thành công. Bạn đã được cấp quyền.</p>

        <button onclick="goToNextPage()" 
                class="mt-12 w-full py-7 bg-gradient-to-r from-green-500 to-emerald-500 rounded-2xl text-2xl font-bold tracking-wide hover:scale-105 transition">
          TIẾP TỤC TRUY CẬP KHO →
        </button>
      </div>
    </div>

    <!-- 4. PROTECTED SCREEN -->
    <div id="protected-screen" class="hidden">
      <div class="glass rounded-3xl p-8">
        <h1 class="text-3xl font-bold text-center mb-8">Secure Document Vault</h1>
        
        <div class="bg-zinc-950/70 border border-purple-500/30 rounded-2xl p-6 mb-8">
          <p class="text-xs text-slate-400 mb-2 flex justify-between">
            <span>LINK BẢO MẬT - ĐÃ MÃ HÓA</span>
            <span onclick="copyLink()" class="cursor-pointer text-purple-400 hover:underline">Sao chép</span>
          </p>
          <p id="encrypted-link" class="font-mono text-sm text-purple-300 break-all">
            aHR0cHM6Ly9kaXNjb3JkLmdnL2dkN3FXWnRHNg==
          </p>
        </div>

        <button onclick="decryptAndRedirect()" 
                class="w-full py-7 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-2xl text-xl font-bold hover:brightness-110 transition-all flex items-center justify-center gap-3">
          <i class="fas fa-unlock"></i>
          GIẢI MÃ & MỞ TÀI LIỆU
        </button>
      </div>
    </div>
  </div>

  <!-- MENU -->
  <div id="menu-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="glass rounded-3xl w-full max-w-md mx-4 p-8">
      <div class="flex justify-between mb-8">
        <h2 class="text-2xl font-bold">Menu</h2>
        <button onclick="toggleMenu()" class="text-3xl">✕</button>
      </div>
      <div class="space-y-2">
        <button onclick="goHome()" class="w-full text-left px-6 py-4 hover:bg-white/10 rounded-2xl flex items-center gap-4">
          <i class="fas fa-home"></i><span>Trang chính</span>
        </button>
        <button onclick="showAbout()" class="w-full text-left px-6 py-4 hover:bg-white/10 rounded-2xl flex items-center gap-4">
          <i class="fas fa-info-circle"></i><span>Về chúng tôi</span>
        </button>
        <button onclick="showPrivacy()" class="w-full text-left px-6 py-4 hover:bg-white/10 rounded-2xl flex items-center gap-4">
          <i class="fas fa-shield-alt"></i><span>Chính sách bảo mật</span>
        </button>
      </div>
      <button onclick="logout()" class="mt-8 w-full text-red-400 py-4 hover:bg-red-500/10 rounded-2xl">Thoát phiên</button>
    </div>
  </div>

  <!-- About & Privacy Modal -->
  <div id="about-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[110]">...</div>
  <div id="privacy-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[110]">...</div>

  <script>
    const correctPIN = atob("a2V5OWg5");

    function verifyOTP() {
      const input = document.getElementById('otp').value.trim();
      
      if (input !== correctPIN) {
        alert("❌ Mã xác thực không đúng!");
        return;
      }

      // Chuyển sang Verifying
      document.getElementById('otp-screen').classList.add('hidden');
      document.getElementById('verifying-screen').classList.remove('hidden');
      
      animateVerification();
    }

    function animateVerification() {
      const steps = [
        "Khởi tạo kết nối bảo mật",
        "Kiểm tra danh tính",
        "Xác minh thiết bị",
        "Kiểm tra quyền truy cập",
        "Hoàn tất xác thực"
      ];
      const container = document.getElementById('steps');
      container.innerHTML = "";

      steps.forEach((text, i) => {
        setTimeout(() => {
          const div = document.createElement('div');
          div.className = "flex items-center gap-3 text-slate-300";
          div.innerHTML = `<i class="fas fa-check-circle text-green-400"></i><span>${text}</span>`;
          container.appendChild(div);
        }, i * 400);
      });

      // Chuyển sang Success sau 2.2 giây
      setTimeout(() => {
        document.getElementById('verifying-screen').classList.add('hidden');
        document.getElementById('success-screen').classList.remove('hidden');
      }, 2300);
    }

    function goToNextPage() {
      document.getElementById('success-screen').classList.add('hidden');
      document.getElementById('protected-screen').classList.remove('hidden');
    }

    function decryptAndRedirect() {
      const realLink = atob("aHR0cHM6Ly9kaXNjb3JkLmdnL2dkN3FXWnRHNg==");
      alert("🔓 Giải mã thành công!\n\nĐang chuyển hướng...");
      setTimeout(() => window.open(realLink, '_blank'), 700);
    }

    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('encrypted-link').innerText);
      alert("✅ Đã sao chép!");
    }

    // Menu functions
    function toggleMenu() {
      document.getElementById('menu-modal').classList.toggle('hidden');
    }

    function showAbout() {
      toggleMenu();
      // Thêm nội dung About nếu cần
      alert("SecureVault - Nền tảng xác thực và bảo vệ tài liệu an toàn.");
    }

    function showPrivacy() {
      toggleMenu();
      alert("Chính sách bảo mật:\nTất cả liên kết tự hủy sau 15 phút.\nDữ liệu được mã hóa đầu cuối.");
    }

    function goHome() {
      location.reload();
    }

    function logout() {
      if (confirm("Thoát phiên?")) location.reload();
    }

    // Enter key
    document.getElementById('otp').addEventListener('keypress', e => {
      if (e.key === 'Enter') verifyOTP();
    });
  </script>
</body>
</html>
